name: Database Setup Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Database
        run: docker compose up -d

      - name: Wait for Postgres
        run: |
          until docker exec mydb pg_isready -U postgres; do
            echo "Waiting for Postgres to start..."
            sleep 2
          done

      - name: Run Database Initialization Script
        run: |
          chmod +x init-db.sh
          ./init-db.sh
