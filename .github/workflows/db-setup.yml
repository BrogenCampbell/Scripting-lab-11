name: Database Setup Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Database
        run: docker compose up -d

      - name: Check Database Logs
        run: docker compose logs db

      - name: Wait for Postgres
        run: |
          echo "Waiting for Postgres to accept connections..."
          # This loop checks the 'db' service every 4 seconds
          for i in {1..15}; do
            if docker compose exec -T db pg_isready -U postgres; then
              echo "Postgres is ready!"
              exit 0
            fi
            echo "Still waiting... ($i/15)"
            sleep 4
          done
          echo "Postgres failed to start."
          exit 1

      - name: Run Database Initialization Script
        run: |
          chmod +x init-db.sh
          # Pipes the local script into the container's bash
          docker compose exec -T db bash < init-db.sh
